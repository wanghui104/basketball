<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Halfcourt Sketch</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="game-shell">
    <canvas id="game" width="1280" height="720" aria-label="Halfcourt basketball prototype"></canvas>
    <section class="hud" aria-label="Game controls">
      <div class="brand">Halfcourt Sketch</div>
      <div class="score">
        <span>进球</span>
        <strong id="made-count">0</strong>
      </div>
      <div class="controls">
        <span>WASD / 方向键 移动</span>
        <span>I 加速</span>
        <span>Space 投篮</span>
        <span>R 重置</span>
      </div>
    </section>
  </main>
  <script src="./game.js"></script>
</body>
</html>
